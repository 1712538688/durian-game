<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>榴莲忘贩</title>
    <style>
        :root{--bg:#1a1a2e;--panel:#16213e;--accent:#e6b422;--danger:#e74c3c;--success:#2ecc71;--text:#f0e6d3;--text-dim:#a09080;--card-bg:#2c2c3e;--order-bg:#3d3522;--radius:14px;--radius-sm:10px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px;gap:18px}
        #game-screen{display:none;flex-direction:column;width:100%;max-width:500px;gap:8px}
        .top-bar{display:flex;justify-content:space-between;background:var(--panel);padding:10px 14px;border-radius:var(--radius-sm)}
        .order-area{background:var(--order-bg);border-radius:var(--radius);padding:12px;min-height:70px;border:2px dashed #5a4a2a;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
        .order-token{background:#5a4a28;border-radius:8px;padding:6px 12px;font-weight:700;color:#f0d878}
        .players-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px}
        .player-card{background:var(--card-bg);border-radius:var(--radius-sm);padding:10px;text-align:center;border:2px solid transparent}
        .player-card.current-turn{border-color:var(--accent);animation:glow 1.5s infinite}
        @keyframes glow{0%,100%{box-shadow:0 0 8px rgba(230,180,34,.3)}50%{box-shadow:0 0 20px rgba(230,180,34,.6)}}
        .self-stock-area{background:var(--panel);border-radius:var(--radius);padding:16px;text-align:center;border:2px dashed #444}
        .self-stock-area .mystery-card{font-size:3rem;filter:blur(18px);opacity:.35}
        .action-bar{display:flex;gap:10px}
        .btn-flip{background:#3a6b5e;color:#e0f0e8;flex:1;padding:16px;border-radius:var(--radius-sm);border:0;font-weight:700;font-size:1rem;cursor:pointer}
        .btn-ring{background:#c0392b;color:#ffe0d0;flex:1;padding:16px;border-radius:var(--radius-sm);border:0;font-weight:700;font-size:1rem;cursor:pointer}
        button:disabled{opacity:.4;transform:none!important}
        .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:100}
        .modal{background:var(--panel);border-radius:var(--radius);padding:24px;max-width:380px;width:90%;text-align:center}
        .modal h3{color:var(--accent);margin-bottom:12px}
        .fruit-options{display:flex;gap:12px;justify-content:center}
        .fruit-option{padding:16px 24px;border-radius:var(--radius-sm);border:2px solid #555;background:var(--card-bg);color:var(--text);font-size:1.1rem;cursor:pointer}
        .btn-close{margin-top:16px;padding:10px 30px;border-radius:20px;background:#555;color:#fff;border:0;cursor:pointer}
    </style>
</head>
<body>
<div id="game-screen">
    <div class="top-bar">
        <span id="round-info">⏳ 等待...</span>
        <span id="pile-info">📦 牌库: -</span>
        <span id="my-anger">😡 愤怒:0</span>
    </div>
    <div class="order-area" id="order-area">📋 暂无订单</div>
    <div class="players-grid" id="players-grid"></div>
    <div class="self-stock-area" id="self-stock">
        <div class="mystery-card">🃏❓</div>
        <div style="color:#888;font-size:0.8rem;">🔒 你的库存（其他玩家可见）</div>
    </div>
    <div class="action-bar">
        <button class="btn-flip" id="btn-flip" disabled>📜 翻订单牌</button>
        <button class="btn-ring" id="btn-ring" disabled>🔔 摇铃质疑</button>
    </div>
</div>
<div class="modal-overlay" id="fruit-modal" style="display:none">
    <div class="modal"><h3>选择水果加入订单</h3><div class="fruit-options" id="fruit-options"></div></div>
</div>
<div class="modal-overlay" id="arb-modal" style="display:none">
    <div class="modal" id="arb-content"></div>
</div>
<div class="modal-overlay" id="over-modal" style="display:none">
    <div class="modal" id="over-content"></div>
</div>

<script>
const fruitEmoji={durian:'🫒',banana:'🍌',apple:'🍎',orange:'🍊',grape:'🍇'};
const fruitNames={durian:'榴莲',banana:'香蕉',apple:'苹果',orange:'橙子',grape:'葡萄'};
function getFruit(f){return (fruitEmoji[f]||'🍈')+' '+(fruitNames[f]||f);}
let ws,playerId,isMyTurn=false;

function connectToServer(ip, nickname) {
    ws = new WebSocket('ws://'+ip+':3456');
    ws.onopen = () => { ws.send(JSON.stringify({type:'join', playerName: nickname})); };
    ws.onmessage = (e) => {
        const m = JSON.parse(e.data);
        if (m.type==='joined') {
            playerId = m.playerId;
            document.getElementById('game-screen').style.display='flex';
            document.getElementById('round-info').textContent='等待玩家... ('+m.playerCount+'/'+m.maxPlayers+')';
        } else if (m.type==='game_start' || m.type==='game_state') {
            updateState(m.state);
        } else if (m.type==='your_turn') {
            isMyTurn = true;
            document.getElementById('btn-flip').disabled=false;
            document.getElementById('btn-ring').disabled=false;
            document.getElementById('round-info').textContent='🔥 轮到你了！';
        } else if (m.type==='card_flipped') {
            showFruitSelection(m.card);
        } else if (m.type==='gorilla_card') {
            alert('🦧 '+m.data.gorillaName+'！'+m.data.effectDetail);
        } else if (m.type==='arbitration') {
            showArbitration(m.data);
        } else if (m.type==='game_over') {
            showGameOver(m.state);
        } else if (m.type==='error') {
            alert('⚠️ '+m.message);
        }
    };
}

function updateState(s) {
    document.getElementById('pile-info').textContent='📦 牌库: '+s.deckRemaining+'张';
    const me = s.players.find(p=>p.id===playerId);
    if (me) document.getElementById('my-anger').textContent='😡 愤怒: '+(me.angerTokens||[]).reduce((a,b)=>a+b,0);
    document.getElementById('order-area').innerHTML = s.orderCards.length ? s.orderCards.map(f=>'<span class="order-token">'+getFruit(f)+'</span>').join('') : '📋 暂无订单';
    document.getElementById('players-grid').innerHTML = s.players.filter(p=>p.id!==playerId).map(p=>{
        let st=''; const stock=s.revealedStocks?s.revealedStocks[p.id]:p.stockCard;
        if (stock) st=stock.isSister?'🍌∞':(stock.top?getFruit(stock.top.fruit)+'×'+stock.top.count:'')+'<br>'+(stock.bottom?getFruit(stock.bottom.fruit)+'×'+stock.bottom.count:'');
        return '<div class="player-card'+(p.id===s.currentTurnPlayerId?' current-turn':'')+'"><div><b>'+p.name+'</b></div><div>'+st+'</div></div>';
    }).join('');
    const selfStock = s.revealedStocks&&me ? s.revealedStocks[me.id] : null;
    document.getElementById('self-stock').innerHTML = selfStock ? '<div>'+ (selfStock.isSister?'🍌∞':getFruit(selfStock.top.fruit)+'×'+selfStock.top.count)+'</div><div style="color:#f0c040;">⚖️ 仲裁公开中</div>' : '<div class="mystery-card">🃏❓</div><div style="color:#888;font-size:0.8rem;">🔒 你的库存</div>';
}

function showFruitSelection(card) {
    document.getElementById('fruit-options').innerHTML = card.options.map(f=>'<button class="fruit-option" data-f="'+f+'">'+getFruit(f)+'</button>').join('');
    document.getElementById('fruit-modal').style.display='flex';
    document.querySelectorAll('#fruit-options .fruit-option').forEach(b=>b.onclick=()=>{
        ws.send(JSON.stringify({type:'select_fruit', fruit:b.dataset.f}));
        document.getElementById('fruit-modal').style.display='none';
        document.getElementById('btn-flip').disabled=true;
        document.getElementById('btn-ring').disabled=true;
        isMyTurn=false;
    });
}

function showArbitration(m) {
    document.getElementById('arb-content').innerHTML = '<h3>'+(m.correct?'✅ 质疑正确！':'❌ 质疑错误！')+'</h3><p>'+m.challengerName+' 质疑 '+getFruit(m.fruitQuestioned)+'</p><p>订单总量:'+m.orderTotal+' 库存:'+m.stockTotal+'</p><p style="color:'+(m.correct?'var(--success)':'var(--danger)')+';">'+m.punishedName+' 获得愤怒标记 ['+m.angerToken+']</p><button class="btn-close" onclick="document.getElementById(\'arb-modal\').style.display=\'none\'">继续</button>';
    document.getElementById('arb-modal').style.display='flex';
}

function showGameOver(scores) {
    const sorted = scores.sort((a,b)=>a.totalAnger-b.totalAnger);
    document.getElementById('over-content').innerHTML = '<h3>🏁 游戏结束！</h3><p>🏆 获胜者：<b>'+sorted[0].name+'</b> ('+sorted[0].totalAnger+'分)</p>'+sorted.map((p,i)=>(i===0?'🥇':i===1?'🥈':i===2?'🥉':'')+p.name+': '+p.totalAnger+'分').join('<br>')+'<button class="btn-close" onclick="document.getElementById(\'over-modal\').style.display=\'none\'">关闭</button>';
    document.getElementById('over-modal').style.display='flex';
}

document.getElementById('btn-flip').onclick=()=>{ if(isMyTurn){ ws.send(JSON.stringify({type:'flip_card'})); document.getElementById('btn-flip').disabled=true; document.getElementById('btn-ring').disabled=true; }};
document.getElementById('btn-ring').onclick=()=>{ if(isMyTurn&&confirm('确定摇铃质疑吗？')){ ws.send(JSON.stringify({type:'ring_bell'})); document.getElementById('btn-flip').disabled=true; document.getElementById('btn-ring').disabled=true; }};
</script>
</body>
</html>
