name: Build APK
on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: 17
    - name: Setup Gradle Wrapper
      run: |
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
        networkTimeout=10000
        validateDistributionUrl=true
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        echo '#!/bin/sh' > gradlew
        echo 'export GRADLE_USER_HOME=${GRADLE_USER_HOME:-$HOME/.gradle}' >> gradlew
        echo 'cd "$(dirname "$0")" || exit' >> gradlew
        echo 'exec java -cp "gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
        chmod +x gradlew
        gradle wrapper --gradle-version 8.2
    - name: Build APK
      run: ./gradlew assembleDebug
    - uses: actions/upload-artifact@v4
      with:
        name: durian-game-debug
        path: app/build/outputs/apk/debug/app-debug.apk
